# This workflow triggers a Mintlify docs deployment after a successful NPM publish.
name: Deploy Docs

on:
  # zizmor: ignore[dangerous-triggers] — the job checks out no code and runs no
  # untrusted input; it only fires an authenticated curl to Mintlify.
  workflow_run:
    workflows: ['Publish NPM']
    types: [completed]

# This workflow only makes an outbound API call, so it needs no GITHUB_TOKEN scopes.
permissions: {}

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Mintlify deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.MINTLIFY_ADMIN_API_KEY }}" \
            -f \
            "https://api.mintlify.com/v1/project/update/654fc0f2b99260c1f6526775"
